# deepseek-council GitHub Actions template
# Copy to .github/workflows/plan-review.yml in your repo.
#
# Triggers on PRs that touch PLAN.md (or your plan file path).
# Fails the PR if the council returns MAJOR_REVISE.
# Adds a PR comment with the verdict table.
#
# Required secrets:
#   DEEPSEEK_API_KEY   — DeepSeek API key (platform.deepseek.com)
#   GEMINI_API_KEY     — Gemini API key (free tier works; optional if you only use DeepSeek)

name: Plan Review

on:
  pull_request:
    paths:
      - "PLAN.md"
      - "plans/**.md"

jobs:
  council:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deepseek-council
        run: pip install git+https://github.com/nhouseholder/deepseek-council.git

      - name: Find changed plan files
        id: plans
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'PLAN.md' 'plans/*.md' | head -5)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run council review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          RESULT=0
          REPORT=""
          for f in ${{ steps.plans.outputs.files }}; do
            echo "Reviewing $f ..."
            OUT=$(python3 -m review --plan "$f" --council --diff origin/${{ github.base_ref }} --json-output 2>&1) || RESULT=1
            REPORT="$REPORT\n\n### $f\n$OUT"
          done
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $RESULT

      - name: Comment verdict on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.review.outputs.report }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## deepseek-council verdict\n\n${report}\n\n*Generated by [deepseek-council](https://github.com/nhouseholder/deepseek-council)*`
            });
